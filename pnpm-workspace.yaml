packages:
  - "packages/*"
  - "tests/integration"

allowBuilds:
  better-sqlite3: true
  esbuild: false
  # declined native build scripts — pure-JS fallbacks suffice for unix-socket docker use
  cpu-features: false
  protobufjs: false
  ssh2: false

# Supply-chain policy: dependencies must be >=24h old at resolution time
minimumReleaseAge: 1440
